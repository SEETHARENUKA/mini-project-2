<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Mood Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1000px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

.date{
    text-align:center;
    margin-bottom:20px;
    color:#666;
    font-size:18px;
}

.mood-selector{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.emoji{
    font-size:40px;
    cursor:pointer;
    transition:.3s;
    padding:10px;
    border-radius:50%;
}

.emoji:hover{
    transform:scale(1.3);
    background:#f0f0f0;
}

.selected{
    background:#d6e4ff;
}

.section-title{
    margin:20px 0;
    color:#444;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
}

.day{
    background:#f7f7f7;
    min-height:70px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.day span{
    font-size:25px;
}

.stats{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.card{
    color:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.happy{background:#4CAF50;}
.good{background:#2196F3;}
.neutral{background:#FF9800;}
.sad{background:#9C27B0;}
.angry{background:#F44336;}

.footer{
    text-align:center;
    margin-top:25px;
    color:#777;
}

@media(max-width:600px){
.calendar{
grid-template-columns:repeat(4,1fr);
}
}
</style>
</head>
<body>

<div class="container">

<h1>😊 Daily Mood Tracker</h1>

<div class="date" id="todayDate"></div>

<h2 class="section-title">Select Today's Mood</h2>

<div class="mood-selector">
<div class="emoji" onclick="saveMood('😄')">😄</div>
<div class="emoji" onclick="saveMood('🙂')">🙂</div>
<div class="emoji" onclick="saveMood('😐')">😐</div>
<div class="emoji" onclick="saveMood('😔')">😔</div>
<div class="emoji" onclick="saveMood('😡')">😡</div>
</div>

<h2 class="section-title">📅 Monthly Mood Grid</h2>
<div class="calendar" id="calendar"></div>

<h2 class="section-title">📊 Monthly Statistics</h2>

<div class="stats">
<div class="card happy">
<h3>😄 Happy</h3>
<p id="happyCount">0</p>
</div>

<div class="card good">
<h3>🙂 Good</h3>
<p id="goodCount">0</p>
</div>

<div class="card neutral">
<h3>😐 Neutral</h3>
<p id="neutralCount">0</p>
</div>

<div class="card sad">
<h3>😔 Sad</h3>
<p id="sadCount">0</p>
</div>

<div class="card angry">
<h3>😡 Angry</h3>
<p id="angryCount">0</p>
</div>
</div>

<div class="footer">
Track your mood every day 🌟
</div>

</div>

<script>

const today = new Date();

document.getElementById("todayDate").innerHTML =
"Today: " + today.toDateString();

function saveMood(mood){

let moods = JSON.parse(localStorage.getItem("moods")) || {};

let key = new Date().toISOString().split("T")[0];

moods[key] = mood;

localStorage.setItem("moods", JSON.stringify(moods));

loadCalendar();
updateStats();

alert("Mood Saved Successfully!");
}

function loadCalendar(){

const calendar = document.getElementById("calendar");
calendar.innerHTML="";

const moods = JSON.parse(localStorage.getItem("moods")) || {};

const year = today.getFullYear();
const month = today.getMonth();

const daysInMonth =
new Date(year, month+1, 0).getDate();

for(let day=1; day<=daysInMonth; day++){

let dateKey =
`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

let emoji = moods[dateKey] || "";

let box = document.createElement("div");
box.className="day";

box.innerHTML=
`<div>${day}</div>
<span>${emoji}</span>`;

calendar.appendChild(box);
}
}

function updateStats(){

const moods = JSON.parse(localStorage.getItem("moods")) || {};

let happy=0;
let good=0;
let neutral=0;
let sad=0;
let angry=0;

Object.values(moods).forEach(mood=>{

if(mood==="😄") happy++;
if(mood==="🙂") good++;
if(mood==="😐") neutral++;
if(mood==="😔") sad++;
if(mood==="😡") angry++;

});

document.getElementById("happyCount").innerText=happy;
document.getElementById("goodCount").innerText=good;
document.getElementById("neutralCount").innerText=neutral;
document.getElementById("sadCount").innerText=sad;
document.getElementById("angryCount").innerText=angry;
}

loadCalendar();
updateStats();

</script>

</body>
</html>
